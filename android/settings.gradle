pluginManagement {
    def props = new Properties()
    file("local.properties").withInputStream { props.load(it) }
    def flutterSdkPath = props.getProperty("flutter.sdk")
    assert flutterSdkPath != null : "flutter.sdk not set in local.properties"

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.0" apply false  // UPDATED
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false  // UPDATED
    id "com.google.gms.google-services" version "4.4.2" apply false  // ADDED
}

include ":app"
