plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // Required by AGP 8+
    namespace "com.cryptex_malawi.app"

    compileSdk = 34  // UPDATED: Set explicit SDK version
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17  // UPDATED from VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_17  // UPDATED from VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "17"  // UPDATED from VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.cryptex_malawi.app"
        // Single, explicit minSdk for AGP 8.x
        minSdkVersion 23
        targetSdk = 34  // UPDATED: Set explicit target SDK
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.multidex:multidex:2.0.1"
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.concurrent:concurrent-futures:1.1.0'

    // Firebase via BoM (keeps versions aligned) - UPDATED to latest
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-storage'
    implementation 'com.google.firebase:firebase-messaging'
}

apply plugin: 'com.google.gms.google-services'
